defaults:
   - dataset_downloaders: utsig
   - transforms: main
   - model: convnext-tiny
   - loss: binary_loss
   - metrics: accuracy
   - _self_

dataloaders:
   _target_: torch.utils.data.DataLoader
   batch_size: 16
   num_workers: 2
   pin_memory: True

train_test_split:
   split: 0.8
   shuffle: True

writer: 
   _target_: src.logger.WandBWriter
   project_name: "offline-signature-verification"
   entity: null
   run_name: "first-run"
   mode: "online"
   loss_names: ["loss"]
   log_checkpoints: False
   id_length: 8

optimizer: 
   _target_: torch.optim.AdamW
   lr: 1e-5
   weight_decay: 0.01
   betas: [0.9, 0.999]

lr_scheduler:
  _target_: torch.optim.lr_scheduler.OneCycleLR
  max_lr: 1e-5
  epochs: ${trainer.n_epochs}
  steps_per_epoch: ${trainer.epoch_len}
  pct_start: 0.2
  div_factor: 50.0
  final_div_factor: 1e4

loss:
  _target_: src.loss.bce_loss.BCEWithLogitsLoss
  pos_weight: 1.35

trainer:
   seed: 42
   epoch_len: 100
   n_epochs: 500
   log_step: 50
   monitor: "max test_Accuracy"
   early_stop: ${trainer.n_epochs}
   device: auto
   device_tensors: ["img", "labels"]
   save_dir: "saved"
   save_period: 5
   resume_from: null
   override: False
   max_grad_norm: 1.0
   